# Minimal, maintainable example config for mautrix-teams.
#
# This file is intentionally shorter than the full autogenerated mautrix config.
# Use it as a readable starting point, then run `./mautrix-teams -e` if you need
# every framework-level option and default.

network:
  # Optional override for the Teams web app OAuth client ID used during
  # localStorage extraction and refresh-token exchange.
  # Leave empty unless the built-in default stops matching teams.live.com.
  client_id: ""

bridge:
  command_prefix: "!teams"

  # Grant at least one Matrix user admin access so you can manage the bridge.
  permissions:
    "@admin:example.com": admin

database:
  # Use sqlite3-fk-wal for local development, postgres for shared deployments.
  type: sqlite3-fk-wal
  uri: "file:mautrix-teams.db?_txlock=immediate"
  max_open_conns: 5
  max_idle_conns: 2

homeserver:
  # URL the bridge uses to reach the homeserver.
  address: "http://localhost:8008"

  # Matrix server name.
  domain: "example.com"

  # Use `standard` for ordinary Synapse/Dendrite-style homeservers.
  # Use `hungry` only if you intentionally deploy against Hungryserv.
  software: standard

  # Leave disabled unless your homeserver side explicitly supports the mautrix
  # websocket transport.
  websocket: false

appservice:
  # URL the homeserver uses to call into the bridge.
  address: "http://127.0.0.1:29340"

  # Bind address for the local bridge listener.
  hostname: "127.0.0.1"
  port: 29340

  # Stable appservice identity.
  id: "mautrix-teams"

  bot:
    username: "teamsbot"
    displayname: "Teams bridge bot"
    avatar: ""

  # Replace with real secrets before use. Do not commit production values.
  as_token: "CHANGE_ME_AS_TOKEN"
  hs_token: "CHANGE_ME_HS_TOKEN"

  # MXID template for remote Teams ghosts.
  username_template: "teams_{{.}}"

matrix:
  # These are reasonable defaults for a small maintainer-run deployment.
  message_status_events: true
  delivery_receipts: false
  message_error_notices: true
  sync_direct_chat_list: false
  federate_rooms: false

provisioning:
  # Protect this like any other secret. Set to "disable" if you do not expose
  # provisioning endpoints.
  shared_secret: "CHANGE_ME_LONG_RANDOM_SECRET"
  allow_matrix_auth: true
  debug_endpoints: false

backfill:
  enabled: true
  max_initial_messages: 50
  max_catchup_messages: 200

encryption:
  # Set to false if you do not need encrypted Matrix rooms.
  allow: true
  default: true
  require: true

  # Secret used to encrypt Matrix crypto state in the bridge DB.
  pickle_key: "CHANGE_ME_PICKLE_KEY"

logging:
  min_level: info
  writers:
    - type: stdout
      format: pretty-colored
    - type: file
      format: json
      filename: ./logs/bridge.log
      max_size: 100
      max_backups: 10
      compress: false
